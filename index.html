<script type="text/babel">

const SB_URL = 'https://kxklbnwfnhvbxulsoolu.supabase.co';

const sb = window.supabase.createClient(SB_URL, SB_KEY);

// ============ ICONS ============
const Ic = ({d,size=20,cls=""})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={cls}><path d={d}/></svg>
);
const IcClock    = p=><Ic {...p} d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 4v6l4 2"/>;
const IcLogout   = p=><Ic {...p} d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>;
const IcFile     = p=><Ic {...p} d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8"/>;
const IcUsers    = p=><Ic {...p} d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>;

const IcChevron  = p=><Ic {...p} d="M9 18l6-6-6-6"/>;
const IcUserPlus = p=><Ic {...p} d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M8.5 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM20 8v6M23 11h-6"/>;
const IcSearch   = p=><Ic {...p} d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>;
const IcBrief    = p=><Ic {...p} d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>;
const IcPin      = p=><Ic {...p} d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0zM12 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>;
const IcBack     = p=><Ic {...p} d="M19 12H5M12 19l-7-7 7-7"/>;
const IcCamera   = p=><Ic {...p} d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2zM12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>;
const IcCopy     = p=><Ic {...p} d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2M8 4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2z"/>;
const IcTrash    = p=><Ic {...p} d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>;
const IcMap      = p=><Ic {...p} d="M1 6l7-4 8 4 7-4v16l-7 4-8-4-7 4V6zM8 2v18M16 6v18"/>;

// ============ DATA AWAL ============
const ADMIN_ID = 'admin456231';
const initEmployees = [
  {id:'KRY-001',name:'Budi Santoso',position:'Staff IT',location:'Kantor Pusat'},
  {id:'KRY-002',name:'Siti Aminah',position:'Admin Gudang',location:'Gudang Sektor 4'},
  {id:'KRY-003',name:'Rudi Hartono',position:'Security',location:'Kantor Pusat'},
];

const genId = (list) => {
  let n = list.length + 1;
  let id = `KRY-${String(n).padStart(3,'0')}`;
  while(list.some(e=>e.id===id)){n++;id=`KRY-${String(n).padStart(3,'0')}`;}
  return id;
};

// ============ APP ============
function App() {
  const [user, setUser]         = useState(null);
  const [employees, setEmp]     = useState([]);
  const [records, setRec]       = useState([]);
  const [loading, setLoading]   = useState(true);

  useEffect(()=>{ loadAll(); },[]);

  const loadAll = async () => {
    setLoading(true);
    try {
      const [eR, rR] = await Promise.all([
        sb.from('employees').select('*').order('id'),
        sb.from('records').select('*').order('time',{ascending:false})
      ]);
      if(eR.data && eR.data.length>0){
        setEmp(eR.data.map(e=>({id:e.id,name:e.name,position:e.position,location:e.location})));
      } else {
        await sb.from('employees').insert(initEmployees);
        setEmp(initEmployees);
      }
      setRec((rR.data||[]).map(r=>({
        id:r.id, employeeId:r.employee_id, name:r.name,
        location:r.location, type:r.type, time:r.time,
        photo:r.photo, latitude:r.latitude, longitude:r.longitude, maps_url:r.maps_url
      })));
    } catch(e){
      console.error(e);
      setEmp(initEmployees);
    }
    setLoading(false);
  };

  if(loading) return (
    <div className="min-h-screen bg-indigo-600 flex flex-col items-center justify-center gap-4">
      <div className="w-14 h-14 border-4 border-white border-t-transparent rounded-full spin"/>
      <p className="text-white font-semibold">Memuat data...</p>
    </div>
  );

  if(!user) return <Login onLogin={setUser} employees={employees}/>;
  if(user==='admin') return <AdminDash onLogout={()=>setUser(null)} employees={employees} setEmp={setEmp} records={records} setRec={setRec} reload={loadAll}/>;
  return <EmpDash user={user} onLogout={()=>setUser(null)} records={records} setRec={setRec}/>;
}

// ============ LOGIN ============
function Login({onLogin, employees}) {
  const [id,setId]     = useState('');
  const [err,setErr]   = useState('');
  const [busy,setBusy] = useState(false);

  const submit = e => {
    e.preventDefault(); setBusy(true); setErr('');
    setTimeout(()=>{
      const t = id.trim();
      if(t===ADMIN_ID){ onLogin('admin'); }
      else {
        const emp = employees.find(e=>e.id.toUpperCase()===t.toUpperCase());
        emp ? onLogin(emp) : setErr('ID tidak valid. Periksa kembali.');
      }
      setBusy(false);
    },500);
  };

  return (
    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 relative overflow-hidden">
      <div className="absolute top-0 left-0 w-full h-1/3 bg-indigo-600 rounded-b-3xl"/>
      <div className="relative bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-100">
        <div className="text-center mb-8">
          <div className="bg-indigo-50 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <IcClock size={40} cls="text-indigo-600"/>
          </div>
          <h1 className="text-2xl font-extrabold text-slate-800">Portal Kehadiran</h1>
        </div>
        <form onSubmit={submit} className="space-y-4">
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-2">ID Pengguna</label>
            <input type="text" placeholder="Masukkan ID" required autoComplete="off" autoCorrect="off" autoCapitalize="none"
              className="w-full px-4 py-4 rounded-xl border border-slate-200 bg-slate-50 outline-none text-slate-800 font-mono text-center text-lg tracking-widest focus:ring-2 focus:ring-indigo-500"
              value={id} onChange={e=>setId(e.target.value)}/>
          </div>
          {err && <div className="p-3 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded">{err}</div>}
          <button type="submit" disabled={busy}
            className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl flex justify-center items-center gap-2 disabled:opacity-60">
            {busy?'Memverifikasi...':'MASUK'} {!busy&&<IcChevron size={18}/>}
          </button>
        </form>
      </div>
    </div>
  );
}

// ============ ADMIN DASHBOARD ============
function AdminDash({onLogout,employees,setEmp,records,setRec,reload}) {
  const [tab,setTab] = useState('laporan');
  return (

        </div>
        <nav className="p-4 flex-1 flex flex-col gap-2">
          <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mt-3 mb-1">Menu</p>

// ============ ADMIN KARYAWAN ============
function AdminKaryawan({employees,setEmp}) {
  const [form,setForm]       = useState({name:'',position:'',location:''});
  const [showForm,setShow]   = useState(false);
  const [lastAdded,setLast]  = useState(null);
  const [deleting,setDel]    = useState(false);

  const handleAdd = async e => {
    e.preventDefault();
    const newId = genId(employees);
    const {error} = await sb.from('employees').insert([{id:newId,name:form.name,position:form.position,location:form.location}]);
    if(error){alert('Gagal: '+error.message);return;}
    const emp = {id:newId,...form};
    setEmp(prev=>[...prev,emp]);
    setLast(emp);
    setForm({name:'',position:'',location:''});
    setShow(false);
  };

  const handleDelete = async (emp) => {
    if(!window.confirm(`Hapus karyawan ${emp.name} (${emp.id})?\nData absensinya juga akan terhapus.`)) return;
    setDel(true);
    await sb.from('records').delete().eq('employee_id',emp.id);
    await sb.from('employees').delete().eq('id',emp.id);
    setEmp(prev=>prev.filter(e=>e.id!==emp.id));
    setDel(false);
    alert(`Karyawan ${emp.name} berhasil dihapus.`);
  };

  const copy = t => {
    if(navigator.clipboard) navigator.clipboard.writeText(t).then(()=>alert('ID disalin: '+t));
    else { const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('ID disalin: '+t); }
  };

  return (
    <div className="space-y-5">
      <div className="flex justify-between items-center">
        <div><h1 className="text-2xl font-bold text-slate-800">Data Karyawan</h1><p className="text-slate-500 text-sm mt-1">{employees.length} karyawan terdaftar</p></div>
        <button onClick={()=>setShow(!showForm)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2.5 rounded-xl font-medium flex items-center gap-2">
          {showForm?<IcX size={16}/>:<IcUserPlus size={16}/>} {showForm?'Batal':'Tambah'}
        </button>
      </div>

      {lastAdded && (
        <div className="bg-emerald-50 border-2 border-emerald-400 rounded-2xl p-5">
          <p className="text-emerald-800 font-bold text-sm mb-3">✅ Karyawan berhasil ditambahkan!</p>
          <div className="bg-white rounded-xl p-4 border border-emerald-200">
            <p className="text-xs text-slate-500 mb-1">Nama</p>
            <p className="font-bold text-slate-800 mb-3">{lastAdded.name}</p>
            <p className="text-xs text-slate-500 mb-1">ID Login</p>
            <div className="flex items-center gap-3">
              <span className="text-2xl font-mono font-extrabold text-indigo-700 bg-indigo-50 px-4 py-2 rounded-xl border-2 border-indigo-200">{lastAdded.id}</span>
              <button onClick={()=>copy(lastAdded.id)} className="flex items-center gap-1 px-3 py-2 bg-indigo-600 text-white text-sm rounded-lg">
                <IcCopy size={14}/> Salin
              </button>
            </div>
            <p className="text-xs text-amber-600 mt-3">⚠️ Berikan ID ini kepada karyawan untuk login</p>
          </div>
          <button onClick={()=>setLast(null)} className="text-xs text-slate-400 mt-2">Tutup</button>
        </div>
      )}

      {showForm && (
        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
          <h3 className="font-bold text-slate-800 mb-4 pb-3 border-b">Tambah Karyawan Baru</h3>
          <form onSubmit={handleAdd} className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label className="text-sm font-medium text-slate-700 block mb-1">Nama Lengkap</label>
              <input required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Nama..." className="w-full border border-slate-200 bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400"/></div>
            <div><label className="text-sm font-medium text-slate-700 block mb-1">Jabatan</label>
              <input required value={form.position} onChange={e=>setForm({...form,position:e.target.value})} placeholder="Staff IT..." className="w-full border border-slate-200 bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400"/></div>
            <div className="md:col-span-2"><label className="text-sm font-medium text-slate-700 block mb-1">Lokasi</label>
              <input required value={form.location} onChange={e=>setForm({...form,location:e.target.value})} placeholder="Kantor Pusat..." className="w-full border border-slate-200 bg-slate-50 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-400"/></div>
            <div className="md:col-span-2"><button type="submit" className="w-full bg-slate-900 text-white py-3 rounded-xl hover:bg-slate-800 font-medium">Simpan & Generate ID</button></div>
          </form>
        </div>
      )}

      <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <table className="w-full text-left">
          <thead className="bg-slate-50 border-b border-slate-200 text-sm text-slate-600">
            <tr><th className="p-4 font-semibold">ID Login</th><th className="p-4 font-semibold">Profil</th><th className="p-4 font-semibold">Lokasi</th><th className="p-4 font-semibold text-center">Aksi</th></tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {employees.map(emp=>(
              <tr key={emp.id} className="hover:bg-slate-50">
                <td className="p-4">
                  <div className="flex items-center gap-2">
                    <span className="px-2 py-1 rounded-md text-sm font-mono font-bold bg-indigo-50 text-indigo-700 border border-indigo-100">{emp.id}</span>
                    <button onClick={()=>copy(emp.id)} className="text-slate-300 hover:text-indigo-500"><IcCopy size={13}/></button>
                  </div>
                </td>
                <td className="p-4">
                  <div className="font-semibold text-slate-800">{emp.name}</div>
                  <div className="text-xs text-slate-500 flex items-center gap-1 mt-0.5"><IcBrief size={11}/>{emp.position}</div>
                </td>
                <td className="p-4 text-slate-600 text-sm">
                  <div className="flex items-center gap-1"><IcPin size={13} cls="text-slate-400"/>{emp.location}</div>
                </td>
                <td className="p-4 text-center">
                  <button onClick={()=>handleDelete(emp)} disabled={deleting}
                    className="inline-flex items-center gap-1 px-3 py-1.5 bg-red-50 text-red-500 hover:bg-red-100 rounded-lg text-xs font-medium border border-red-200">
                    <IcTrash size={13}/> Hapus
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ============ ADMIN LAPORAN ============
function AdminLaporan({records,setRec}) {
  const [filterLoc,setLoc]       = useState('');
  const [filterPeriod,setPeriod] = useState('Semua Waktu');
  const [exporting,setExp]       = useState(false);
  const [deleting,setDel]        = useState(false);

  const filtered = records.filter(r=>{
    const ml = !filterLoc || r.location.toLowerCase().includes(filterLoc.toLowerCase());
    const now=new Date(), d=new Date(r.time);
    let mp = true;
    if(filterPeriod==='Hari Ini') mp=d.toDateString()===now.toDateString();
    else if(filterPeriod==='Minggu Ini') mp=d>=new Date(now-7*86400000);
    else if(filterPeriod==='Bulan Ini') mp=d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return ml&&mp;
  });

  const deleteAll = async () => {
    if(!window.confirm(`Hapus SEMUA ${filtered.length} data absensi yang terfilter?\nTindakan ini tidak bisa dibatalkan!`)) return;
    setDel(true);
    const ids = filtered.map(r=>r.id);
    await sb.from('records').delete().in('id',ids);
    setRec(prev=>prev.filter(r=>!ids.includes(r.id)));
    setDel(false);
    alert('Data absensi berhasil dihapus.');
  };

  const exportPDF = () => {
    if(filtered.length===0){alert('Tidak ada data untuk diekspor.');return;}
    setExp(true);
    setTimeout(()=>{
      try {
        let JsPDF = (window.jspdf&&window.jspdf.jsPDF)||window.jsPDF;
        if(!JsPDF) throw new Error('Library PDF tidak ditemukan');
        const doc = new JsPDF({orientation:'landscape',unit:'mm',format:'a4'});

        doc.setFillColor(79,70,229);
        doc.rect(0,0,297,24,'F');
        doc.setTextColor(255,255,255);
        doc.setFontSize(14); doc.setFont('helvetica','bold');
        doc.text('LAPORAN KEHADIRAN KARYAWAN',148.5,11,{align:'center'});
        doc.setFontSize(8); doc.setFont('helvetica','normal');
        doc.text('Dicetak: '+new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})+
          '  |  Periode: '+filterPeriod+'  |  Lokasi: '+(filterLoc||'Semua'),148.5,18,{align:'center'});
        doc.setTextColor(0,0,0);

        doc.autoTable({
          startY:28,
          head:[['No','Tanggal','Waktu','Nama','ID','Lokasi','Status','GPS']],
          body:filtered.map((r,i)=>[
            i+1,
            new Date(r.time).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}),
            new Date(r.time).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})+' WIB',
            r.name, r.employeeId, r.location,
            r.type==='Check In'?'MASUK':'PULANG',
            r.latitude?`${r.latitude.toFixed(5)}, ${r.longitude.toFixed(5)}`:'-'
          ]),
          headStyles:{fillColor:[79,70,229],textColor:255,fontStyle:'bold',fontSize:8,halign:'center'},
          bodyStyles:{fontSize:7},
          columnStyles:{0:{halign:'center',cellWidth:8},2:{halign:'center'},4:{halign:'center'},6:{halign:'center',fontStyle:'bold'}},
          alternateRowStyles:{fillColor:[248,250,252]},
          margin:{left:5,right:5},
        });

        // Download via base64 - kompatibel Android
        const b64 = doc.output('datauristring');
        const a = document.createElement('a');
        a.href = b64;
        a.download = 'Laporan-'+new Date().toISOString().slice(0,10)+'.pdf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        alert('✅ PDF berhasil diunduh! Cek folder Downloads.');
      } catch(err) {
        alert('Gagal buat PDF: '+err.message);
      }
      setExp(false);
    },200);
  };

  return (
    <div className="space-y-5">
      <div className="flex flex-wrap justify-between items-center gap-3">
        <div><h1 className="text-2xl font-bold text-slate-800">Laporan Kehadiran</h1><p className="text-slate-500 text-sm mt-1">{filtered.length} data ditemukan</p></div>
        <div className="flex gap-2">
          {filtered.length>0 && (
            <button onClick={deleteAll} disabled={deleting}
              className="bg-red-50 border border-red-200 hover:bg-red-100 text-red-600 px-4 py-2.5 rounded-xl font-medium flex items-center gap-2 text-sm">
              <IcTrash size={15}/> {deleting?'Menghapus...':'Hapus Data'}
            </button>
          )}
          <button onClick={exportPDF} disabled={exporting||filtered.length===0}
            className="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white px-4 py-2.5 rounded-xl font-medium flex items-center gap-2 text-sm">
            <IcPrint size={15}/> {exporting?'Membuat...':'Ekspor PDF'}
          </button>
        </div>
      </div>

      <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
        <div className="flex items-center gap-2 mb-4 pb-3 border-b border-slate-100"><IcSearch size={15} cls="text-slate-400"/><span className="font-semibold text-slate-700 text-sm">Filter</span></div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div><label className="text-xs font-medium text-slate-500 uppercase tracking-wider block mb-1.5">Periode</label>
            <select value={filterPeriod} onChange={e=>setPeriod(e.target.value)} className="w-full border border-slate-200 bg-slate-50 p-2.5 rounded-lg text-sm outline-none">
              <option>Semua Waktu</option><option>Hari Ini</option><option>Minggu Ini</option><option>Bulan Ini</option>
            </select></div>
          <div><label className="text-xs font-medium text-slate-500 uppercase tracking-wider block mb-1.5">Wilayah</label>
            <input value={filterLoc} onChange={e=>setLoc(e.target.value)} placeholder="Cari lokasi..." className="w-full border border-slate-200 bg-slate-50 p-2.5 rounded-lg text-sm outline-none"/></div>
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
        <div className="overflow-x-auto">
          <table className="w-full text-left min-w-[700px]">
            <thead className="bg-slate-50 border-b border-slate-200">
              <tr>
                <th className="p-4 font-semibold text-slate-600 text-sm">Tanggal & Waktu</th>
                <th className="p-4 font-semibold text-slate-600 text-sm">Karyawan</th>
                <th className="p-4 font-semibold text-slate-600 text-sm">Lokasi</th>
                <th className="p-4 font-semibold text-slate-600 text-sm">Status</th>
                <th className="p-4 font-semibold text-slate-600 text-sm text-center">Foto</th>
                <th className="p-4 font-semibold text-slate-600 text-sm text-center">Maps</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {filtered.length>0 ? filtered.map(r=>(
                <tr key={r.id} className="hover:bg-slate-50">
                  <td className="p-4">
                    <div className="text-sm text-slate-700">{new Date(r.time).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})}</div>
                    <div className="text-sm font-bold text-indigo-600">{new Date(r.time).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})} WIB</div>
                  </td>
                  <td className="p-4">
                    <div className="font-semibold text-slate-800">{r.name}</div>
                    <div className="text-xs text-slate-400 font-mono">{r.employeeId}</div>
                  </td>
                  <td className="p-4 text-slate-600 text-sm">{r.location}</td>
                  <td className="p-4">
                    <span className={`px-2.5 py-1 rounded-full text-xs font-bold ${r.type==='Check In'?'bg-emerald-50 text-emerald-700':'bg-amber-50 text-amber-700'}`}>
                      {r.type==='Check In'?'✅ Masuk':'🔶 Pulang'}
                    </span>
                  </td>
                  <td className="p-4 text-center">
                    {r.photo ? <img src={r.photo} alt="foto" className="w-10 h-10 rounded-lg object-cover mx-auto border border-slate-200"/> : <span className="text-xs text-slate-300">—</span>}
                  </td>
                  <td className="p-4 text-center">
                    {r.maps_url ? (
                      <a href={r.maps_url} target="_blank" rel="noreferrer"
                        className="inline-flex items-center gap-1 px-2.5 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-xs font-medium hover:bg-blue-100 border border-blue-200">
                        <IcPin size={12}/> Maps
                      </a>
                    ):(
                      <span className="text-xs text-slate-300">—</span>
                    )}
                  </td>
                </tr>
              )):(
                <tr><td colSpan="6" className="p-10 text-center text-slate-400">
                  <IcFile size={36} cls="mx-auto mb-2 opacity-20"/>
                  <p>Tidak ada data</p>
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ============ EMPLOYEE DASHBOARD ============
function EmpDash({user,onLogout,records,setRec}) {
  const [time,setTime]             = useState(new Date());
  const [absenType,setType]        = useState(null);
  const [cameraActive,setCamActive]= useState(false);
  const [photoData,setPhoto]       = useState(null);
  const [stream,setStream]         = useState(null);
  const [camError,setCamError]     = useState('');
  const [submitting,setSubmitting] = useState(false);
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);

  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t);},[]);

  // Attach stream ke video
  useEffect(()=>{
    if(cameraActive && stream && videoRef.current){
      videoRef.current.srcObject = stream;
      videoRef.current.play().catch(()=>{});
    }
  },[cameraActive,stream]);

  const myRecs = records.filter(r=>r.employeeId===user.id).sort((a,b)=>new Date(b.time)-new Date(a.time));

  const startCam = async () => {
    setPhoto(null); setCamError('');
    // Coba berbagai constraint untuk kompatibilitas Android APK
    const constraints = [
      {video:{facingMode:{ideal:'user'},width:{ideal:640},height:{ideal:480}}},
      {video:{facingMode:'user'}},
      {video:true}
    ];
    let ok = false;
    for(const c of constraints){
      try {
        const s = await navigator.mediaDevices.getUserMedia(c);
        setStream(s); setCamActive(true); ok=true; break;
      } catch(err){ console.warn('Cam try failed:',err.message); }
    }
    if(!ok){
      setCamError('Kamera tidak bisa dibuka. Pastikan izin kamera sudah diberikan di pengaturan browser/app.');
    }
  };

  const stopCam = () => {
    if(stream) stream.getTracks().forEach(t=>t.stop());
    setStream(null); setCamActive(false);
  };

  const cancelFlow = () => { stopCam(); setType(null); setPhoto(null); setCamError(''); };

  const takePhoto = () => {
    if(!videoRef.current||!canvasRef.current) return;
    const v=videoRef.current, cv=canvasRef.current;
    cv.width=v.videoWidth||640; cv.height=v.videoHeight||480;
    cv.getContext('2d').drawImage(v,0,0);
    setPhoto(cv.toDataURL('image/jpeg',0.75));
    stopCam();
  };

  const confirmSubmit = async () => {
    if(!photoData||!absenType||submitting) return;
    setSubmitting(true);

    // Ambil GPS
    let lat=null, lng=null, mapsUrl=null;
    try {
      const pos = await new Promise((res,rej)=>
        navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:6000})
      );
      lat=pos.coords.latitude; lng=pos.coords.longitude;
      mapsUrl=`https://www.google.com/maps?q=${lat},${lng}`;
    } catch(e){ console.warn('GPS skip:',e.message); }

    const rec = {
      id:Date.now(), employeeId:user.id, name:user.name,
      location:user.location, type:absenType,
      time:new Date().toISOString(), photo:photoData,
      latitude:lat, longitude:lng, maps_url:mapsUrl
    };

    const {error} = await sb.from('records').insert([{
      id:rec.id, employee_id:rec.employeeId, name:rec.name,
      location:rec.location, type:rec.type, time:rec.time,
      photo:rec.photo, latitude:lat, longitude:lng, maps_url:mapsUrl
    }]);

    if(error){ alert('Gagal simpan: '+error.message); setSubmitting(false); return; }

    setRec(prev=>[rec,...prev]);
    const gpsMsg = mapsUrl?'\n📍 Lokasi GPS direkam':'\n⚠️ GPS tidak aktif';
    alert('✅ Berhasil!\nAbsen '+(absenType==='Check In'?'Masuk':'Pulang')+' pukul '+new Date().toLocaleTimeString('id-ID')+gpsMsg);
    cancelFlow();
    setSubmitting(false);
  };

  const deleteMyRecord = async (id) => {
    if(!window.confirm('Hapus data absensi ini?')) return;
    await sb.from('records').delete().eq('id',id);
    setRec(prev=>prev.filter(r=>r.id!==id));
  };

  return (
    <div className="min-h-screen bg-slate-100 flex flex-col">
      <header className="bg-white px-5 py-4 flex justify-between items-center shadow-sm sticky top-0 z-20">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-700 font-bold border border-indigo-200">{user.name.charAt(0)}</div>
          <div><p className="font-bold text-slate-800 leading-tight">{user.name}</p><p className="text-xs text-slate-500">{user.position} · {user.id}</p></div>
        </div>
        <button onClick={onLogout} className="text-slate-400 hover:text-red-500 p-2.5 rounded-full hover:bg-red-50"><IcLogout size={20}/></button>
      </header>

      <div className="flex-1 p-4 max-w-lg mx-auto w-full space-y-5 pb-12">
        {/* Jam */}
        <div className="relative overflow-hidden bg-slate-900 rounded-3xl p-7 text-center shadow-xl">
          <div style={{position:'absolute',top:0,right:0,width:'7rem',height:'7rem',background:'#6366f1',borderRadius:'50%',filter:'blur(40px)',opacity:.5,transform:'translate(50%,-50%)'}}/>
          <div style={{position:'absolute',bottom:0,left:0,width:'7rem',height:'7rem',background:'#3b82f6',borderRadius:'50%',filter:'blur(40px)',opacity:.5,transform:'translate(-50%,50%)'}}/>
          <div style={{position:'relative',zIndex:10}}>
            <p className="text-indigo-200 text-xs font-medium uppercase tracking-wide mb-2">{time.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
            <h2 className="text-5xl font-mono font-bold text-white mb-3 tabular-nums">{time.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</h2>
            <div className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-xs text-slate-300">
              <IcPin size={12}/> {user.location}
            </div>
          </div>
        </div>

        {/* Absen Card */}
        <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-200">
          {!absenType ? (
            <>
              <div className="text-center mb-4"><h3 className="font-bold text-slate-800">Pilih Jenis Absen</h3><p className="text-sm text-slate-500">Klik untuk absen dengan selfie + GPS</p></div>
              <div className="grid grid-cols-2 gap-4">
                <button onClick={()=>{setType('Check In');startCam();}} className="flex flex-col items-center gap-3 bg-emerald-50 hover:bg-emerald-100 border-2 border-emerald-500 text-emerald-700 py-6 rounded-2xl font-bold active:scale-95 transition-transform">
                  <IcCheck size={32}/><span className="text-lg">MASUK</span>
                </button>
                <button onClick={()=>{setType('Check Out');startCam();}} className="flex flex-col items-center gap-3 bg-amber-50 hover:bg-amber-100 border-2 border-amber-500 text-amber-700 py-6 rounded-2xl font-bold active:scale-95 transition-transform">
                  <IcX size={32}/><span className="text-lg">PULANG</span>
                </button>
              </div>
            </>
          ):(
            <div className="space-y-4">
              <div className="flex items-center justify-between">
                <button onClick={cancelFlow} className="text-slate-400 hover:text-slate-700 flex items-center gap-1 text-sm"><IcBack size={16}/> Batal</button>
                <h3 className="font-bold text-slate-800">Absen {absenType==='Check In'?'Masuk':'Pulang'}</h3>
              </div>

              {camError && (
                <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-red-700 text-sm">
                  <p className="font-bold mb-1">⚠️ Kamera tidak dapat dibuka</p>
                  <p>{camError}</p>
                  <button onClick={startCam} className="mt-2 text-red-600 underline text-xs">Coba lagi</button>
                </div>
              )}

              <div className="bg-slate-100 rounded-2xl overflow-hidden border-2 border-slate-200 flex items-center justify-center" style={{aspectRatio:'4/3',minHeight:'200px'}}>
                {photoData
                  ? <img src={photoData} alt="selfie" className="w-full h-full object-cover"/>
                  : cameraActive
                  ? <video ref={videoRef} autoPlay playsInline muted webkit-playsinline="true" className="w-full h-full object-cover"/>
                  : !camError && <div className="flex flex-col items-center gap-2 text-slate-400"><div className="w-8 h-8 border-3 border-slate-300 border-t-indigo-500 rounded-full spin"/><p className="text-sm">Memuat kamera...</p></div>
                }
                <canvas ref={canvasRef} className="hidden"/>
              </div>

              {!photoData && cameraActive && (
                <button onClick={takePhoto} className="w-full bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2">
                  <IcCamera size={20}/> Jepret Foto
                </button>
              )}

              {photoData && (
                <div className="space-y-3">
                  <button onClick={confirmSubmit} disabled={submitting}
                    className={`w-full text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 disabled:opacity-60 ${absenType==='Check In'?'bg-emerald-500 hover:bg-emerald-600':'bg-amber-500 hover:bg-amber-600'}`}>
                    {submitting?'Menyimpan...':'Kirim Absen '+(absenType==='Check In'?'Masuk':'Pulang')}
                  </button>
                  <button onClick={startCam} className="w-full text-sm font-medium text-slate-500 py-3 bg-slate-100 rounded-xl hover:bg-slate-200">Ulangi Foto</button>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Riwayat */}
        <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-200">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-bold text-slate-800">Riwayat Absensi</h3>
            <span className="text-xs text-indigo-600 font-medium">{myRecs.length} data</span>
          </div>
          <div className="space-y-3 max-h-80 overflow-y-auto custom-scrollbar">
            {myRecs.length>0 ? myRecs.map(r=>(
              <div key={r.id} className="p-3.5 bg-slate-50 border border-slate-100 rounded-2xl">
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className={`w-11 h-11 rounded-xl flex items-center justify-center text-white flex-shrink-0 ${r.type==='Check In'?'bg-emerald-500':'bg-amber-500'}`}>
                      {r.type==='Check In'?<IcCheck size={22}/>:<IcX size={22}/>}
                    </div>
                    <div>
                      <p className="font-bold text-slate-800 text-sm">{r.type==='Check In'?'Absen Masuk':'Absen Pulang'}</p>
                      <p className="text-xs text-slate-500">{new Date(r.time).toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short'})}</p>
                      {/* MAPS LINK */}
                      {r.maps_url && (
                        <a href={r.maps_url} target="_blank" rel="noreferrer"
                          className="inline-flex items-center gap-0.5 text-xs text-blue-500 hover:text-blue-700 mt-0.5">
                          <IcPin size={10}/> Lihat lokasi di Maps
                        </a>
                      )}
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    <p className="text-lg font-bold font-mono text-slate-700">{new Date(r.time).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</p>
                    <button onClick={()=>deleteMyRecord(r.id)} className="text-slate-300 hover:text-red-400 p-1"><IcTrash size={14}/></button>
                  </div>
                </div>
              </div>
            )):(
              <div className="text-center py-8 text-slate-400">
                <IcFile size={32} cls="mx-auto mb-2 opacity-20"/>
                <p className="text-sm">Belum ada aktivitas</p>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
